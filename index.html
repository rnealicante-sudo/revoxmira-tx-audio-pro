<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>RevoxMira TX Audio Pro</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/peerjs/1.5.5/peerjs.min.js"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
    body { font-family: 'Inter', system-ui, sans-serif; }
    .glass { background: rgba(255,255,255,0.08); backdrop-filter: blur(20px); }
    .mic-pulse { animation: micPulse 1.8s infinite ease-in-out; }
    @keyframes micPulse { 0%,100% { transform: scale(1); } 50% { transform: scale(1.18); } }
  </style>
</head>
<body class="bg-zinc-950 text-zinc-200 min-h-screen flex items-center justify-center p-4 dark">
  <div class="max-w-lg w-full space-y-8">
    <div class="flex items-center justify-between">
      <div class="flex items-center gap-3">
        <div class="w-12 h-12 bg-gradient-to-br from-violet-500 to-fuchsia-500 rounded-3xl flex items-center justify-center">
          <i class="fa-solid fa-microphone text-white text-3xl"></i>
        </div>
        <div>
          <h1 class="text-4xl font-bold tracking-tighter">RevoxMira</h1>
          <p class="text-violet-400 text-sm font-semibold">TX Audio Pro</p>
        </div>
      </div>
      <button onclick="toggleTheme()" class="p-3 rounded-2xl hover:bg-zinc-900 text-xl"><i id="theme-icon" class="fa-solid fa-moon"></i></button>
    </div>

    <div class="glass border border-zinc-700/50 rounded-3xl p-8 shadow-2xl">
      <div class="flex bg-zinc-900/80 rounded-2xl p-1 mb-8">
        <button onclick="setMode(true)" id="btn-tx" class="flex-1 py-4 text-sm font-semibold rounded-xl">🎤 Transmisor (TX)</button>
        <button onclick="setMode(false)" id="btn-rx" class="flex-1 py-4 text-sm font-semibold rounded-xl">🎧 Receptor (RX)</button>
      </div>

      <!-- TX Controls -->
      <div id="tx-panel" class="space-y-6">
        <div>
          <label class="block text-zinc-400 text-sm mb-2">Micrófono</label>
          <select id="micSelect" class="w-full bg-zinc-900 border border-zinc-700 rounded-2xl px-5 py-4 text-white"></select>
        </div>
        <div>
          <div class="flex justify-between text-xs text-zinc-400 mb-1"><span>Ganancia TX</span><span id="tx-gain-val">1.0x</span></div>
          <input type="range" id="tx-gain" min="0" max="3" step="0.05" value="1" class="w-full">
        </div>
      </div>

      <!-- RX Gain -->
      <div id="rx-panel" class="hidden">
        <div class="flex justify-between text-xs text-zinc-400 mb-1"><span>Ganancia RX (volumen recibido)</span><span id="rx-gain-val">1.0x</span></div>
        <input type="range" id="rx-gain" min="0" max="5" step="0.1" value="1" class="w-full">
      </div>

      <!-- Meters -->
      <div class="space-y-6 mt-8">
        <div id="tx-meter" class="hidden">
          <div class="flex justify-between text-xs text-emerald-400 mb-1"><span>TX Mic</span><span id="tx-vol">0%</span></div>
          <div class="h-2.5 bg-zinc-800 rounded-full"><div id="tx-bar" class="h-full w-0 bg-emerald-400 rounded-full"></div></div>
        </div>
        <div id="rx-meter" class="hidden">
          <div class="flex justify-between text-xs text-violet-400 mb-1"><span>RX Recibido</span><span id="rx-vol">0%</span></div>
          <div class="h-2.5 bg-zinc-800 rounded-full"><div id="rx-bar" class="h-full w-0 bg-violet-400 rounded-full"></div></div>
        </div>
      </div>

      <div class="flex gap-3 mt-8">
        <button onclick="iniciar()" class="flex-1 bg-gradient-to-r from-violet-600 to-fuchsia-600 py-4 rounded-2xl font-semibold flex items-center justify-center gap-3">
          <i class="fa-solid fa-broadcast-tower"></i> <span id="start-btn-text">Iniciar</span>
        </button>
        <button onclick="toggleMute()" id="mute-btn" class="hidden w-14 bg-zinc-800 border border-zinc-700 rounded-2xl items-center justify-center"><i id="mute-icon" class="fa-solid fa-microphone text-2xl"></i></button>
        <button onclick="detener()" class="w-14 bg-zinc-800 border border-zinc-700 hover:border-red-500 rounded-2xl flex items-center justify-center"><i class="fa-solid fa-circle-stop text-2xl"></i></button>
      </div>

      <div id="share-container" class="hidden mt-6">
        <button onclick="copiarEnlace()" class="w-full py-3 bg-zinc-800 hover:bg-zinc-700 border border-zinc-600 rounded-2xl flex items-center justify-center gap-3">
          <i class="fa-solid fa-share-nodes"></i> Copiar enlace para oyentes
        </button>
      </div>

      <div id="status" class="mt-8 min-h-[70px] text-center text-sm font-medium px-6 py-5 rounded-2xl bg-zinc-900 border border-zinc-700"></div>
      <div id="live" class="hidden mt-4 flex items-center justify-center gap-3 text-emerald-400 text-sm"><div class="w-3.5 h-3.5 bg-emerald-500 rounded-full mic-pulse"></div> TRANSMITIENDO EN VIVO</div>
    </div>
  </div>

  <script>
    let peer, localProcessedStream, remoteAudio;
    let isTX = true;
    let txGainNode, rxGainNode, txAnalyser, rxAnalyser;
    let txCtx, rxCtx;

    function setMode(tx) {
      isTX = tx;
      document.getElementById("btn-tx").classList.toggle("bg-zinc-800", !tx);
      document.getElementById("btn-rx").classList.toggle("bg-zinc-800", tx);
      document.getElementById("tx-panel").classList.toggle("hidden", !tx);
      document.getElementById("rx-panel").classList.toggle("hidden", tx);
      document.getElementById("mute-btn").classList.toggle("hidden", !tx);
      document.getElementById("share-container").classList.toggle("hidden", !tx);
      document.getElementById("start-btn-text").textContent = tx ? "Iniciar Transmisión" : "Conectar Receptor";
    }

    async function iniciar() {
      const status = document.getElementById("status");
      status.textContent = isTX ? "Accediendo micrófono..." : "Esperando transmisión...";

      try {
        if (isTX) {
          const micId = document.getElementById("micSelect").value;
          const stream = await navigator.mediaDevices.getUserMedia({
            audio: { deviceId: micId ? { exact: micId } : undefined, sampleRate: 48000, channelCount: 2, echoCancellation: false, noiseSuppression: false }
          });

          // Procesar con Gain y VU meter TX
          txCtx = new (window.AudioContext || window.webkitAudioContext)();
          const source = txCtx.createMediaStreamSource(stream);
          txGainNode = txCtx.createGain();
          txGainNode.gain.value = 1;
          txAnalyser = txCtx.createAnalyser();
          txAnalyser.fftSize = 128;
          source.connect(txGainNode);
          txGainNode.connect(txAnalyser);
          const dest = txCtx.createMediaStreamDestination();
          txGainNode.connect(dest);
          localProcessedStream = dest.stream;

          // Iniciar VU TX
          startVUMeter(txAnalyser, "tx-bar", "tx-vol");
        }

        peer = new Peer(isTX ? "emisora" : "receptor");

        peer.on("open", () => {
          status.textContent = `Conectado como ${isTX ? 'TRANSMISOR' : 'RECEPTOR'}`;
          if (isTX) {
            const call = peer.call("receptor", localProcessedStream);
            console.log("Llamada enviada desde TX");
          }
        });

        // Receptor
        if (!isTX) {
          peer.on("call", (call) => {
            console.log("Llamada recibida en RX");
            call.answer(); // Sin stream de vuelta
            call.on("stream", (remoteStream) => {
              console.log("Stream recibido en RX → reproduciendo");
              status.textContent = "Audio recibido correctamente";
              document.getElementById("live").classList.remove("hidden");

              if (!remoteAudio) {
                remoteAudio = new Audio();
                remoteAudio.autoplay = true;
                remoteAudio.playsInline = true;
              }
              remoteAudio.srcObject = remoteStream;
              remoteAudio.play().catch(e => console.error("Play error:", e));

              // Ganancia y VU RX
              rxCtx = new (window.AudioContext || window.webkitAudioContext)();
              const source = rxCtx.createMediaStreamSource(remoteStream);
              rxGainNode = rxCtx.createGain();
              rxGainNode.gain.value = 1;
              rxAnalyser = rxCtx.createAnalyser();
              rxAnalyser.fftSize = 128;
              source.connect(rxGainNode);
              rxGainNode.connect(rxAnalyser);
              startVUMeter(rxAnalyser, "rx-bar", "rx-vol");
              document.getElementById("rx-meter").classList.remove("hidden");
            });
          });
        }
      } catch (e) {
        console.error(e);
        status.textContent = "Error: " + e.message;
      }
    }

    function startVUMeter(analyser, barId, volId) {
      const data = new Uint8Array(analyser.frequencyBinCount);
      function loop() {
        analyser.getByteFrequencyData(data);
        let sum = 0;
        for (let v of data) sum += v;
        const percent = Math.min(100, Math.floor((sum / data.length) * 1.8));
        document.getElementById(barId).style.width = percent + "%";
        document.getElementById(volId).textContent = percent + "%";
        requestAnimationFrame(loop);
      }
      loop();
    }

    function toggleMute() {
      // ... (mantengo el mute existente)
    }

    function detener() {
      if (localProcessedStream) localProcessedStream.getTracks().forEach(t => t.stop());
      if (remoteAudio) remoteAudio.pause();
      if (peer) peer.destroy();
      document.getElementById("live").classList.add("hidden");
      document.getElementById("status").textContent = "Detenido";
    }

    function copiarEnlace() {
      navigator.clipboard.writeText(window.location.href);
      alert("Enlace copiado. Ábrelo en otra pestaña o dispositivo como Receptor.");
    }

    function toggleTheme() {
      document.documentElement.classList.toggle("dark");
    }

    window.onload = () => {
      setMode(true);
      // Listar micrófonos (opcional)
    };
  </script>
</body>
</html>
